# AdaptixCore canonical Dependabot config (generated — do not hand-edit;
# regenerate with scripts/cb/gen-dependabot-config.py). Policy 2026-06-17:
# weekly, grouped patch/minor (one PR/ecosystem), separate major PRs,
# security updates always on, PR limits to prevent noise. Auto-merge of
# patch/minor low-risk non-critical PRs is handled server-side by
# scripts/cb/pr-automation.py (AWS CodeBuild governance job) — never by
# Dependabot comment commands.
version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      patch-and-minor:
        applies-to: version-updates
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      patch-and-minor:
        applies-to: version-updates
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
