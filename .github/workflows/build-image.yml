name: Build and Deploy Production

# Production deploy pipeline for Adaptix-Temporal-Service.
#
# Four ECS services (one per task queue) share the same container image.
# The TASK_QUEUE environment variable in each task definition determines
# which domain the worker instance handles:
#   adaptix-production-temporal-billing
#   adaptix-production-temporal-notifications
#   adaptix-production-temporal-documents
#   adaptix-production-temporal-onboarding
#
# Deploy strategy:
#   1. Build image and push to ECR with immutable SHA tag.
#   2. Register new task definition revisions for all four services.
#   3. Update all four ECS services concurrently (force-new-deployment).
#   4. Wait for each service to reach steady state.
#
# No database migrations — temporal workers have no database of their own.
# All persistence is through Adaptix service APIs.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: adaptix-temporal-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy Temporal worker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: "793439286972"
      ECR_REPOSITORY: adaptix-temporal
      ECS_CLUSTER: adaptix-production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        run: |
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_TAG="${GITHUB_SHA:0:8}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          docker buildx build \
            --push \
            --tag "${IMAGE_URI}" \
            --build-arg GIT_COMMIT_SHA="${GITHUB_SHA}" \
            --build-arg BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --file backend/Dockerfile \
            backend/

          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Update ECS services
        run: |
          # Deploy all four worker services with the new image.
          SERVICES=(
            "adaptix-production-temporal-billing"
            "adaptix-production-temporal-notifications"
            "adaptix-production-temporal-documents"
            "adaptix-production-temporal-onboarding"
          )

          for SERVICE in "${SERVICES[@]}"; do
            FAMILY="${SERVICE}"

            # Get current task definition.
            TASK_DEF_JSON=$(aws ecs describe-task-definition \
              --task-definition "${FAMILY}" \
              --output json)

            # Inject new image URI into the container definition.
            NEW_TASK_DEF=$(echo "${TASK_DEF_JSON}" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          td = d['taskDefinition']
          for c in td['containerDefinitions']:
              c['image'] = '${IMAGE_URI}'
          print(json.dumps({
              'family': td['family'],
              'containerDefinitions': td['containerDefinitions'],
              'taskRoleArn': td.get('taskRoleArn', ''),
              'executionRoleArn': td.get('executionRoleArn', ''),
              'networkMode': td.get('networkMode', 'awsvpc'),
              'requiresCompatibilities': td.get('requiresCompatibilities', ['FARGATE']),
              'cpu': td.get('cpu', '256'),
              'memory': td.get('memory', '512'),
          }))
          ")

            # Register new task definition revision.
            NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
              --cli-input-json "${NEW_TASK_DEF}" \
              --output json \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['taskDefinition']['taskDefinitionArn'])")

            echo "Deploying ${SERVICE} with ${NEW_TASK_DEF_ARN}"

            # Update ECS service.
            aws ecs update-service \
              --cluster "${ECS_CLUSTER}" \
              --service "${SERVICE}" \
              --task-definition "${NEW_TASK_DEF_ARN}" \
              --force-new-deployment \
              > /dev/null

            echo "${SERVICE} deployment triggered"
          done

      - name: Wait for services to stabilise
        run: |
          SERVICES=(
            "adaptix-production-temporal-billing"
            "adaptix-production-temporal-notifications"
            "adaptix-production-temporal-documents"
            "adaptix-production-temporal-onboarding"
          )

          for SERVICE in "${SERVICES[@]}"; do
            echo "Waiting for ${SERVICE}..."
            aws ecs wait services-stable \
              --cluster "${ECS_CLUSTER}" \
              --services "${SERVICE}" || \
            echo "WARNING: ${SERVICE} stability waiter timed out. Deploy was committed — check ECS console."
          done

          echo "All Temporal worker services deployed."
